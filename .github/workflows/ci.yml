name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff radon

      - name: Run lint checks
        run: |
          ruff check tests/unit tests/integration scripts/security scripts/quality

      - name: Enforce complexity budget (no new F-grade)
        run: |
          python scripts/quality/check_complexity_budget.py --target colab_leecher --baseline audit/complexity-f-baseline.json

  unit-tests:
    name: unit-tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Compile source
        run: |
          python -m compileall -q colab_leecher tests/unit tests/integration

      - name: Run unit tests
        run: |
          pytest -q tests/unit

  integration-scaffold:
    name: integration-scaffold
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install integration test tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run integration scaffold tests
        run: |
          pytest -q tests/integration -m integration --runintegration

  security-guardrails:
    name: security-guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sensitive-file policy
        run: |
          python scripts/security/block_sensitive_files.py

      - name: Run pre-commit security hooks
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          pre-commit run --all-files

  dependency-audit-linux:
    name: dependency-audit-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependency-audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run dependency audit (strict mode)
        run: |
          python scripts/security/run_dependency_audit.py --requirements requirements.txt --report-dir audit/raw/ci --fail-on-vulns

      - name: Show dependency audit summary
        if: always()
        run: |
          if [ -f audit/raw/ci/dependency-audit-summary.json ]; then
            cat audit/raw/ci/dependency-audit-summary.json
          else
            echo "dependency-audit-summary.json was not generated"
            exit 1
          fi

      - name: Upload dependency audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-linux-report
          path: audit/raw/ci/
          if-no-files-found: error
          retention-days: 14
