name: Run Telegram Bot

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Bot repository URL"
        required: true
        default: "https://github.com/theSadeQ/Colab-to-Tel.git"

      branch:
        description: "Branch to clone"
        required: true
        default: "master"

      module_name:
        description: "Python module to run"
        required: true
        default: "colab_leecher"

      max_runtime_minutes:
        description: "Maximum runtime before stopping"
        required: true
        default: "350"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      # Required Telegram/API config.
      # Add these in:
      # GitHub repo -> Settings -> Secrets and variables -> Actions -> New repository secret
      API_ID: ${{ secrets.API_ID }}
      API_HASH: ${{ secrets.API_HASH }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      USER_ID: ${{ secrets.USER_ID }}
      DUMP_ID: ${{ secrets.DUMP_ID }}

      # Mock/optional cookies.
      NZBCLOUD_CF_CLEARANCE: ""
      BITSO_IDENTITY_COOKIE: ""
      BITSO_PHPSESSID_COOKIE: ""

      MEGATOOLS_EXECUTABLE: /usr/bin/megatools
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          for var in API_ID API_HASH BOT_TOKEN USER_ID DUMP_ID; do
            if [ -z "${!var:-}" ]; then
              echo "::error::$var is missing. Add it as a GitHub Actions secret."
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

          echo "Required secrets are present."

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            aria2 \
            megatools \
            git \
            curl \
            unzip

          echo "megatools path: $(which megatools || true)"
          echo "ffmpeg path: $(which ffmpeg || true)"
          echo "aria2c path: $(which aria2c || true)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Clone bot repository
        shell: bash
        run: |
          set -euo pipefail

          rm -rf app

          echo "Cloning repository:"
          echo "${{ github.event.inputs.repo_url }}"
          echo "Branch:"
          echo "${{ github.event.inputs.branch }}"

          git clone \
            --depth 1 \
            --branch "${{ github.event.inputs.branch }}" \
            "${{ github.event.inputs.repo_url }}" \
            app

          echo "Repository cloned into ./app"
          ls -la app

      - name: Install Python dependencies
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip setuptools wheel

          if [ -f requirements.txt ]; then
            echo "Installing requirements.txt..."
            if ! pip install --no-cache-dir -r requirements.txt; then
              echo "::warning::Full requirements install failed. Installing critical fallback packages..."

              pip install --no-cache-dir \
                "aiohttp>=3.8.0" \
                "aiofiles>=0.8.0" \
                "pyrofork==2.2.11" \
                "tgcrypto" \
                "yt_dlp" \
                "requests" \
                "Pillow" \
                "psutil" \
                "natsort" \
                "pytz" \
                "google-api-python-client" \
                "google-auth-httplib2" \
                "google-auth-oauthlib" \
                "rarfile>=4.2" \
                "moviepy" \
                "instaloader"
            fi
          else
            echo "::warning::requirements.txt not found. Installing fallback packages..."

            pip install --no-cache-dir \
              "aiohttp>=3.8.0" \
              "aiofiles>=0.8.0" \
              "pyrofork==2.2.11" \
              "tgcrypto" \
              "yt_dlp" \
              "requests" \
              "Pillow" \
              "psutil" \
              "natsort" \
              "pytz" \
              "google-api-python-client" \
              "google-auth-httplib2" \
              "google-auth-oauthlib" \
              "rarfile>=4.2" \
              "moviepy" \
              "instaloader"
          fi

          echo "Trying optional packages..."
          pip install --no-cache-dir uvloop GPUtil pymegatools opencv-python sabyenc || true

      - name: Write credentials.json
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os

          def required(name: str) -> str:
              value = os.environ.get(name)
              if not value:
                  raise RuntimeError(f"Missing required environment variable: {name}")
              return value

          api_id = int(required("API_ID"))
          user_id = int(required("USER_ID"))
          dump_id = int(required("DUMP_ID"))

          # Normalize Telegram supergroup/channel IDs if needed.
          # If someone provides 1593908646, convert it to -1001593908646.
          if dump_id != 0 and not str(dump_id).startswith("-100"):
              abs_id = str(abs(dump_id))
              if len(abs_id) >= 10:
                  dump_id = int("-100" + abs_id)

          credentials = {
              "API_ID": api_id,
              "API_HASH": required("API_HASH"),
              "BOT_TOKEN": required("BOT_TOKEN"),
              "USER_ID": user_id,
              "OWNER_ID": user_id,
              "DUMP_ID": dump_id,
              "GDRIVE_FOLDER_ID": "",
              "INDEX_URL": "",
              "NZBCLOUD_CF_CLEARANCE": os.environ.get("NZBCLOUD_CF_CLEARANCE", ""),
              "BITSO_IDENTITY_COOKIE": os.environ.get("BITSO_IDENTITY_COOKIE", ""),
              "BITSO_PHPSESSID_COOKIE": os.environ.get("BITSO_PHPSESSID_COOKIE", ""),
              "INSTAGRAM": {
                  "USERNAME": "",
                  "COOKIES_FILE": ""
              }
          }

          with open("credentials.json", "w", encoding="utf-8") as f:
              json.dump(credentials, f, indent=4)

          print("credentials.json written successfully")
          print(f"API_ID: {api_id}")
          print(f"USER_ID: {user_id}")
          print(f"DUMP_ID: {dump_id}")
          PY

      - name: Remove old session files
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail

          rm -f my_bot.session my_bot.session-journal my_bot.session-wal
          rm -f direct_downloader_bot_session.session
          rm -f direct_downloader_bot_session.session-journal
          rm -f direct_downloader_bot_session.session-wal

          echo "Old session files removed if they existed."

      - name: Run bot
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail

          MODULE_NAME="${{ github.event.inputs.module_name }}"
          MAX_RUNTIME="${{ github.event.inputs.max_runtime_minutes }}m"

          echo "Starting module: python -m ${MODULE_NAME}"
          echo "Max runtime: ${MAX_RUNTIME}"

          # GitHub-hosted runners are not permanent servers.
          # timeout stops the bot cleanly before the job hard-kills.
          timeout "${MAX_RUNTIME}" python -m "${MODULE_NAME}" || EXIT_CODE=$?

          EXIT_CODE="${EXIT_CODE:-0}"

          if [ "$EXIT_CODE" = "124" ]; then
            echo "Bot stopped because max runtime was reached."
            exit 0
          fi

          exit "$EXIT_CODE"
