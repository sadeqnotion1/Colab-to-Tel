<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Colab-to-Tel — knowledge graph</title>
<style>
  html,body{margin:0;background:#0A0A14;color:#e6e6f0;font:14px/1.4 system-ui,sans-serif}
  header{padding:12px 16px;border-bottom:1px solid #1e1e30}
  h1{font-size:15px;margin:0;color:#06B6D4}
  #wrap{display:flex;height:calc(100vh - 50px)}
  canvas{flex:1;display:block}
  aside{width:320px;overflow:auto;border-left:1px solid #1e1e30;padding:12px;font-size:12px}
  .n{padding:6px 8px;border-radius:6px;margin-bottom:4px;background:#12121f}
  .n b{color:#8B5CF6}
  code{color:#22C55E}
</style></head><body>
<header><h1>Colab-to-Tel — knowledge graph</h1></header>
<div id="wrap"><canvas id="c"></canvas>
<aside id="list"></aside></div>
<script>
const G = {"nodes": [{"id": "ytdl", "type": "entry", "path": "ytdl.py", "desc": "yt-dlp entry point (kept by the open removal PR)."}, {"id": "aria2", "type": "module", "path": "colab_leecher/downlader/aria2.py", "desc": "aria2c download; per-file streaming upload then temp delete."}, {"id": "telegram", "type": "module", "path": "colab_leecher/uploader/telegram.py", "desc": "upload_file(path, display_name, task_ctx); safety-net split upload loop."}, {"id": "converters", "type": "module", "path": "colab_leecher/utility/converters.py", "desc": "archive(): 7z -t7z -mx=1 + split (-v<bytes>b) + -bsp1 stdout %."}, {"id": "handler", "type": "module", "path": "colab_leecher/utility/handler.py", "desc": "Zip_Handler(); leech upload loop over items_to_process (.00N via natsorted)."}, {"id": "task_manager", "type": "module", "path": "colab_leecher/utility/task_manager.py", "desc": "_handle_archive_processing(); chunk size from get_max_split_size_mib()."}, {"id": "task_dashboard", "type": "module", "path": "colab_leecher/utility/task_dashboard.py", "desc": "Dashboard render; archiving = files_processed/total_files; upload pins 0%/Unknown when ts<=u_bytes; ProgressBar.generate(style)."}, {"id": "helper", "type": "module", "path": "colab_leecher/utility/helper.py", "desc": "status_bar() legacy renderer; multipartArchive() handles .001/.002."}, {"id": "progress_manager", "type": "module", "path": "colab_leecher/utility/progress_manager.py", "desc": "StatusDisplay.upload_status(style=sleek)."}, {"id": "enhanced_status", "type": "module", "path": "colab_leecher/utility/enhanced_status.py", "desc": "_modern_upload_status(style=gradient)."}, {"id": "progress_dispatcher", "type": "module", "path": "colab_leecher/utility/progress_dispatcher.py", "desc": "One of 3 competing progress systems (see Issues/mimo.txt)."}, {"id": "ui_copy", "type": "module", "path": "colab_leecher/utility/ui_copy.py", "desc": "build_archiver_progress_text(...)."}, {"id": "variables", "type": "module", "path": "colab_leecher/utility/variables.py", "desc": "Options: archive_format=7z, is_split=True, concurrency=parallel."}, {"id": "archive_progress", "type": "new", "path": "colab_leecher/utility/archive_progress.py", "desc": "NEW (Fix #2): poll on-disk .7z.00N sizes -> dashboard percent."}, {"id": "streaming_archive", "type": "new", "path": "colab_leecher/utility/streaming_archive.py", "desc": "NEW (Fix #5): upload each volume as the next appears; STREAM_ARCHIVE_UPLOAD=1."}, {"id": "issues_mimo", "type": "doc", "path": "Issues/mimo.txt", "desc": "Notes the 3 competing progress systems."}, {"id": "issues_unify", "type": "doc", "path": "Issues/01_progress_system_unification.md", "desc": "Progress unification plan (M2)."}, {"id": "bar_style", "type": "module", "path": "colab_leecher/utility/bar_style.py", "desc": "Centralized single source of truth for BAR_STYLE."}], "edges": [{"from": "task_manager", "to": "handler", "rel": "calls Zip_Handler"}, {"from": "handler", "to": "converters", "rel": "invokes archive()"}, {"from": "handler", "to": "telegram", "rel": "uploads split parts"}, {"from": "converters", "to": "ui_copy", "rel": "build_archiver_progress_text"}, {"from": "converters", "to": "task_dashboard", "rel": "reports archiving state"}, {"from": "aria2", "to": "telegram", "rel": "streaming per-file upload"}, {"from": "task_dashboard", "to": "helper", "rel": "competing renderer"}, {"from": "task_dashboard", "to": "progress_dispatcher", "rel": "competing renderer"}, {"from": "progress_manager", "to": "telegram", "rel": "renders upload status"}, {"from": "enhanced_status", "to": "telegram", "rel": "renders upload status"}, {"from": "archive_progress", "to": "task_dashboard", "rel": "drives files_processed/total_files"}, {"from": "streaming_archive", "to": "telegram", "rel": "uploads volumes during archiving"}, {"from": "converters", "to": "streaming_archive", "rel": "hands running 7z proc (flagged)"}, {"from": "bar_style", "to": "progress_manager", "rel": "imports BAR_STYLE"}, {"from": "bar_style", "to": "task_dashboard", "rel": "imports BAR_STYLE"}, {"from": "bar_style", "to": "enhanced_status", "rel": "imports BAR_STYLE"}]};
const cv = document.getElementById('c'), cx = cv.getContext('2d');
function size(){cv.width=cv.clientWidth;cv.height=cv.clientHeight;}
window.addEventListener('resize',size);size();
const N=G.nodes, E=G.edges, idx={};
N.forEach((n,i)=>{idx[n.id]=i;n.x=cv.width/2+Math.cos(i)*200*Math.random();n.y=cv.height/2+Math.sin(i)*200*Math.random();n.vx=0;n.vy=0;});
function step(){
  for(let i=0;i<N.length;i++)for(let j=i+1;j<N.length;j++){
    let a=N[i],b=N[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy)||1,f=2200/(d*d);
    a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;}
  E.forEach(e=>{let a=N[idx[e.from]],b=N[idx[e.to]];if(!a||!b)return;
    let dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1,f=(d-120)*0.01;
    a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;});
  N.forEach(n=>{n.vx*=0.85;n.vy*=0.85;n.x+=n.vx;n.y+=n.vy;
    n.x=Math.max(40,Math.min(cv.width-40,n.x));n.y=Math.max(40,Math.min(cv.height-40,n.y));});
}
const COL={entry:'#22C55E',module:'#06B6D4',new:'#8B5CF6',doc:'#888',default:'#06B6D4'};
function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  cx.strokeStyle='#2a2a40';cx.lineWidth=1;
  E.forEach(e=>{let a=N[idx[e.from]],b=N[idx[e.to]];if(!a||!b)return;
    cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);cx.stroke();});
  N.forEach(n=>{cx.fillStyle=COL[n.type]||COL.default;
    cx.beginPath();cx.arc(n.x,n.y,7,0,7);cx.fill();
    cx.fillStyle='#cfcfe0';cx.font='11px system-ui';cx.fillText(n.id,n.x+10,n.y+4);});
}
function loop(){for(let k=0;k<3;k++)step();draw();requestAnimationFrame(loop);}
loop();
document.getElementById('list').innerHTML=N.map(n=>
  '<div class="n"><b>'+n.id+'</b> <code>'+(n.path||'')+'</code><br>'+(n.desc||'')+'</div>').join('');
</script></body></html>
